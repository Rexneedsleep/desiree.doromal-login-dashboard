<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Authentication</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #764ba2;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }

        .otp-section {
            display: none;
        }

        .otp-section input {
            text-align: center;
            letter-spacing: 10px;
            font-size: 20px;
        }

        .social-links {
            margin-top: 20px;
            text-align: center;
        }

        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .social-links a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Login Form -->
            <div id="loginForm">
                <h2>Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button class="btn" onclick="handleLogin()">Login</button>
                <div id="loginMessage" class="message hidden"></div>
                <div class="toggle-form">
                    Don't have an account? <a onclick="toggleForm()">Sign up here</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="hidden">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password" required>
                </div>
                <button class="btn" onclick="handleSignup()">Create Account</button>
                <div id="signupMessage" class="message hidden"></div>
                <div class="toggle-form">
                    Already have an account? <a onclick="toggleForm()">Login here</a>
                </div>
            </div>

            <!-- OTP Verification -->
            <div id="otpForm" class="hidden">
                <h2>Verify Email</h2>
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter the 6-digit code sent to your email</p>
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" id="otpCode" placeholder="000000" maxlength="6" required>
                </div>
                <button class="btn" onclick="handleOTPVerification()">Verify</button>
                <div id="otpMessage" class="message hidden"></div>
            </div>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://web.facebook.com/" target="_blank">Facebook</a>
                <a href="https://twitter.com/" target="_blank">Twitter</a>
                <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
            </div>
        </div>
    </div>

    <script>
        const users = JSON.parse(localStorage.getItem('users')) || {};
        let currentSignupEmail = '';

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('signupForm').classList.toggle('hidden');
            clearMessages();
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!username || !password) {
                showMessage(messageDiv, 'Please fill in all fields', 'error');
                return;
            }

            if (users[username] && users[username].password === password) {
                showMessage(messageDiv, 'Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    localStorage.setItem('currentUser', username);
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                showMessage(messageDiv, 'Invalid username or password', 'error');
            }
        }

        function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;
            const messageDiv = document.getElementById('signupMessage');

            if (!name || !email || !username || !password) {
                showMessage(messageDiv, 'Please fill in all fields', 'error');
                return;
            }

            if (users[username]) {
                showMessage(messageDiv, 'Username already exists', 'error');
                return;
            }

            currentSignupEmail = email;
            showMessage(messageDiv, 'Sending verification code...', 'success');
            
            setTimeout(() => {
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('otpForm').classList.remove('hidden');
                showMessage(document.getElementById('otpMessage'), '', 'success');
            }, 1000);
        }

        function handleOTPVerification() {
            const otp = document.getElementById('otpCode').value;
            const messageDiv = document.getElementById('otpMessage');

            if (!otp || otp.length !== 6) {
                showMessage(messageDiv, 'Please enter a valid 6-digit code', 'error');
                return;
            }

            if (otp === '123456') {
                const username = document.getElementById('signupUsername').value;
                const password = document.getElementById('signupPassword').value;
                
                users[username] = {
                    name: document.getElementById('signupName').value,
                    email: currentSignupEmail,
                    password: password
                };
                
                localStorage.setItem('users', JSON.stringify(users));
                showMessage(messageDiv, 'Account created successfully! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    document.getElementById('otpForm').classList.add('hidden');
                    document.getElementById('loginForm').classList.remove('hidden');
                    document.getElementById('signupForm').classList.add('hidden');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                    clearMessages();
                }, 1500);
            } else {
                showMessage(messageDiv, 'Invalid verification code (try: 123456)', 'error');
            }
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
        }

        function clearMessages() {
            document.getElementById('loginMessage').classList.add('hidden');
            document.getElementById('signupMessage').classList.add('hidden');
            document.getElementById('otpMessage').classList.add('hidden');
        }

        // Initialize with a test user
        if (!users['desiree']) {
            users['desiree'] = { name: 'DESIREE', email: 'DESIREEle.com', password: '123' };
            localStorage.setItem('users', JSON.stringify(users));
        }
    </script>
</body>
</html>
